[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Deleted duplicate blog post — content cannibalized /services/meta-ads/ (rejected by Google)
[[redirects]]
  from = "/blog/meta-ads-florida-small-business/"
  to = "/services/meta-ads/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/meta-ads-florida-small-business"
  to = "/services/meta-ads/"
  status = 301
  force = true

# Force trailing slashes to prevent Google "Redirect error" indexing issues
# These only fire when no file exists at the from path (force defaults to false)
[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/services"
  to = "/services/"
  status = 301

[[redirects]]
  from = "/blog/*"
  to = "/blog/:splat/"
  status = 301

[[redirects]]
  from = "/services/*"
  to = "/services/:splat/"
  status = 301

[[redirects]]
  from = "/free-business-audit"
  to = "/free-business-audit/"
  status = 301

# Fallback 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
